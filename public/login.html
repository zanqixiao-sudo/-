<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预览口令登录</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --line: rgba(102, 124, 150, 0.18);
        --text: #1f2d3d;
        --muted: #6b7b8f;
        --accent: #356db0;
        --accent-deep: #264f86;
        --error: #c05c5c;
        --shadow: 0 18px 38px rgba(31, 51, 80, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(173, 194, 220, 0.18), transparent 24%),
          linear-gradient(180deg, #f8fafc 0%, #f3f6fa 42%, #eef2f7 100%);
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: var(--text);
      }

      .card {
        width: min(440px, calc(100% - 24px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 26px;
        box-shadow: var(--shadow);
        padding: 30px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: var(--muted);
        line-height: 1.75;
      }

      label {
        display: block;
        margin-top: 18px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
      }

      button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .message {
        margin-top: 14px;
        min-height: 22px;
        color: var(--error);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">工程维管中心 · 预览访问</p>
      <h1>输入预览口令</h1>
      <p>这个短期预览链接使用单口令保护。输入正确口令后，即可进入查询页面并下载当前数据。</p>
      <form id="login-form">
        <label for="password">预览口令</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button id="submit-button" type="submit">进入预览</button>
        <div id="message" class="message"></div>
      </form>
    </main>
    <script>
      const form = document.getElementById("login-form");
      const password = document.getElementById("password");
      const button = document.getElementById("submit-button");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        message.textContent = "";

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: password.value }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.message || "登录失败");
          }
          window.location.href = data.redirectTo || "/";
        } catch (error) {
          message.textContent = error.message;
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
